<!DOCTYPE html>
<html>
<head>
  <title>Minima Lottery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>MINIMA<br>LOTTERY</h1>
    <div class="line"></div>
    <p class="subtitle">TRANSPARENT • FAIR • DECENTRALIZED</p>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button onclick="showTab('overview')" class="tab active">OVERVIEW</button>
    <button onclick="showTab('tickets')" class="tab">TICKETS</button>
    <button onclick="showTab('winners')" class="tab">WINNERS</button>
  </div>

  <!-- OVERVIEW -->
  <div id="overview" class="tab-content">

    <div class="grid">

      <!-- TIMER -->
      <div class="card big">
        <p class="label">⏳ NEXT DRAW</p>
        <h2 id="timer">--:--:--</h2>
        <p class="small">Draw every 24h</p>
      </div>

      <!-- RIGHT -->
      <div class="side">

        <div class="card">
          <p class="label">💰 PRIZE POOL</p>
          <h2 id="prizePool">0</h2>
          <p class="small">MINIMA</p>
        </div>

        <div class="card">
          <p class="label">🎟 TICKET PRICE</p>
          <h2>0.0000001</h2>
          <p class="small">MINIMA</p>
        </div>

      </div>

    </div>

  </div>

  <!-- TICKETS -->
  <div id="tickets" class="tab-content hidden">

    <div class="card">
      <h3>BUY LOTTERY TICKET</h3>
      <p>Each ticket costs 0.0000001 MINIMA</p>
      <button onclick="buyTicket()">BUY TICKET</button>
    </div>

    <div class="card">
      <h3>YOUR TICKETS</h3>
      <ul id="entries"></ul>
    </div>

  </div>

  <!-- WINNERS -->
  <div id="winners" class="tab-content hidden">

    <div class="card">
      <h3>RECENT WINNERS</h3>
      <div id="winnerList"></div>
    </div>

  </div>

</div>

<script src="app.js"></script>

<script>
function showTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
  document.getElementById(tab).classList.remove('hidden');

  document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
}
</script>

</body>
</html>
