<!DOCTYPE html>
<html>
<head>
    <title>Minima Lottery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🎰 MINIMA LOTTERY</h1>

    <div class="card">
        <p id="walletStatus">🔌 Connecting...</p>
    </div>

    <div class="card">
        <h3>🎯 Round: <span id="round">1</span></h3>
    </div>

    <div class="card">
        <h3>💰 Prize Pool</h3>
        <h2 id="prizePool">0 MINIMA</h2>
    </div>

    <div class="card">
        <h3>🎟 Ticket Price</h3>
        <h2>0.0000001 MINIMA</h2>

        <button class="primary" onclick="buyTicket()">Buy Ticket</button>
    </div>

    <div class="card">
        <button class="secondary" onclick="drawWinner()">🏆 Draw Winner</button>

        <div id="winnerBox">
            <img src="images/trophy.gif" id="winnerImg">
            <h2 id="winner"></h2>
        </div>
    </div>

    <div class="card">
        <h3>Entries (<span id="entryCount">0</span>)</h3>
        <ul id="entries"></ul>
    </div>

    <div class="card">
        <h3>🏆 Leaderboard</h3>
        <ul id="leaderboard"></ul>
    </div>

    <div class="card">
        <h3>📊 Your Stats</h3>
        <p id="yourStats">Loading...</p>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
