<!DOCTYPE html>
<html>
<head>
  <title>Minima Lottery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<main>

  <!-- HEADER -->
  <header>
    <h1><strong>MINIMA</strong> LOTTERY</h1>
    <p>TRANSPARENT • FAIR • DECENTRALIZED</p>

    <div class="connection-status" id="walletStatus">
      <span class="status-indicator"></span>
      Connecting...
    </div>
  </header>

  <!-- GRID -->
  <div class="content-grid">

    <!-- LEFT -->
    <div id="countdownSection" class="card">

      <div class="countdown-label">⏳ NEXT DRAW</div>

      <div id="timer" class="countdown-display">--:--:--</div>

      <div class="divider"></div>

      <div class="divider-text">Draw happens every round</div>

      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-label">YOUR TICKETS</div>
          <div id="yourStats" class="stat-value">0</div>
        </div>

        <div class="stat-item">
          <div class="stat-label">TOTAL ENTRIES</div>
          <div id="entryCount" class="stat-value">0</div>
        </div>
      </div>

    </div>

    <!-- RIGHT -->
    <div>

      <div id="prizeSection">
        <div class="section-label">💰 PRIZE POOL</div>
        <div id="prizePool" class="large-value">0</div>
        <div class="unit">MINIMA</div>
      </div>

      <br>

      <div id="ticketSection">
        <div class="section-label">🎟 TICKET PRICE</div>
        <div class="large-value">0.0000001</div>
        <div class="unit">MINIMA</div>

        <button onclick="buyTicket()">BUY TICKET</button>
      </div>

    </div>

  </div>

  <!-- ENTRIES -->
  <div class="entries-section">
    <div class="section-title">ENTRIES</div>
    <div id="entries"></div>
  </div>

  <!-- WINNERS -->
  <div class="entries-section">
    <div class="section-title">WINNERS</div>
    <div id="winners"></div>
  </div>

</main>

<script src="app.js"></script>

</body>
</html>
