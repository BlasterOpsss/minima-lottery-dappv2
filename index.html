<!DOCTYPE html>
<html>
<head>
    <title>Minima Lottery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🎰 MINIMA LOTTERY</h1>

    <div class="card">
        <p id="walletStatus">🔌 Connecting...</p>
    </div>

    <div class="card">
        <h3>⏳ Next Draw</h3>
        <h2 id="timer">--:--:--</h2>
    </div>

    <div class="card glow">
        <h3>💰 Prize Pool</h3>
        <h2 id="prizePool">1 MINIMA</h2>
    </div>

    <div class="card">
        <h3>🎟 Ticket Price</h3>
        <h2>0.0000001 MINIMA</h2>
        <button onclick="buyTicket()">Buy Ticket</button>
    </div>

    <div class="card">
        <h3>Entries (<span id="entryCount">0</span>)</h3>
        <ul id="entries"></ul>
    </div>

    <div class="card">
        <h3>📊 Your Stats</h3>
        <p id="yourStats">Loading...</p>
    </div>

</div>

<!-- WINNER POPUP -->
<div id="winnerPopup" class="popup hidden">
    <div class="popup-box">
        <h2>🎉 WINNER 🎉</h2>
        <p id="winnerText"></p>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
