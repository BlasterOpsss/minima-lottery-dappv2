<!DOCTYPE html>
<html>
<head>
  <title>Minima Wallet Lottery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div>
      <h1>Wallet</h1>
      <p id="walletStatus">Connecting...</p>
    </div>
    <div class="avatar">🟣</div>
  </div>

  <!-- BALANCE CARD -->
  <div class="balance-card">
    <p class="label">Total Prize Pool</p>
    <h2 id="prizePool">0 MINIMA</h2>
  </div>

  <!-- ACTION -->
  <div class="action-card">
    <button onclick="buyTicket()">Buy Ticket</button>
  </div>

  <!-- TIMER -->
  <div class="card">
    <p class="label">Next Draw</p>
    <h2 id="timer">--:--:--</h2>
  </div>

  <!-- ENTRIES -->
  <div class="card">
    <div class="row">
      <h3>Activity</h3>
      <span id="entryCount">0</span>
    </div>
    <ul id="entries"></ul>
  </div>

  <!-- STATS -->
  <div class="card">
    <h3>Your Stats</h3>
    <p id="yourStats">0 tickets</p>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="nav">
  <div class="nav-item active">🏠</div>
  <div class="nav-item">🎟</div>
  <div class="nav-item">🏆</div>
  <div class="nav-item">⚙️</div>
</div>

<script src="app.js"></script>

</body>
</html>
