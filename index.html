<!DOCTYPE html>
<html>
<head>
    <title>Minima Lottery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="logo">🟣</div>
        <div>
            <h1>Minima Lottery</h1>
            <p class="subtitle">Fair • On-chain • Transparent</p>
        </div>
    </div>

    <!-- WALLET STATUS -->
    <div class="card">
        <p id="walletStatus">🔌 Connecting...</p>
    </div>

    <!-- TIMER -->
    <div class="card">
        <h3>⏳ Next Draw</h3>
        <h2 id="timer">--:--:--</h2>
    </div>

    <!-- PRIZE POOL -->
    <div class="card glow">
        <h3>💰 Prize Pool</h3>
        <h2 id="prizePool">0 MINIMA</h2>
    </div>

    <!-- BUY -->
    <div class="card">
        <h3>🎟 Ticket Price</h3>
        <h2>0.0000001 MINIMA</h2>
        <button onclick="buyTicket()">Buy Ticket</button>
    </div>

    <!-- ENTRIES -->
    <div class="card">
        <h3>Entries (<span id="entryCount">0</span>)</h3>
        <ul id="entries"></ul>
    </div>

    <!-- STATS -->
    <div class="card">
        <h3>📊 Your Stats</h3>
        <p id="yourStats">Loading...</p>
    </div>

</div>

<!-- 🎉 WINNER POPUP -->
<div id="winnerPopup" class="popup hidden">
    <div class="popup-box">
        <h2>🎉 WINNER 🎉</h2>
        <p id="winnerText"></p>
    </div>
</div>

<!-- SCRIPT -->
<script src="app.js"></script>

</body>
</html>
